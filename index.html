<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air's Bossa Nova Lounge 🌿☕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Quicksand:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Default Galaxy Colors */
            --bg-grad-1: #2E004F; 
            --bg-grad-2: #800080; 
            --bg-grad-3: #A52A2A; 
            --text-main: #E0E0E0; 
            --glass-bg: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.1);
            --glow: rgba(244, 197, 66, 0.1); 
            --primary-accent: #800080; 
            --gold-accent: #F4C542; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* We use CSS variables here so JavaScript can smoothly change them! */
            background: linear-gradient(-45deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3), var(--bg-grad-2));
            background-size: 400% 400%;
            animation: infiniteGradient 30s ease infinite;
            font-family: 'Quicksand', sans-serif;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: --bg-grad-1 2s ease, --bg-grad-2 2s ease, --bg-grad-3 2s ease; /* Smooth color transitions */
        }

        /* Hack to allow CSS variables to transition smoothly */
        @property --bg-grad-1 { syntax: '<color>'; inherits: false; initial-value: #2E004F; }
        @property --bg-grad-2 { syntax: '<color>'; inherits: false; initial-value: #800080; }
        @property --bg-grad-3 { syntax: '<color>'; inherits: false; initial-value: #A52A2A; }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 60px 60px, 40px 40px;
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes infiniteGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #ambient-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none; 
            z-index: 1;
            transition: all 1s ease;
        }

        .glass-panel {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 650px;
            background: var(--glass-bg), linear-gradient(135deg, rgba(255, 0, 255, 0.02), rgba(128, 0, 128, 0.02));
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            padding: 40px;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.4), 
                inset 0 0 15px var(--glow); /* Glow changes based on mood */
            text-align: center;
            transition: box-shadow 1s ease;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--gold-accent); 
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            transition: color 1s ease;
        }

        .subtitle {
            font-size: 1.1rem;
            font-style: italic;
            opacity: 0.8;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .breathing-visual {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .breath-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--primary-accent); 
            border-radius: 50%;
            opacity: 0.6;
            animation: breatheAnimation 8s ease-in-out infinite;
            box-shadow: 0 0 15px var(--glow);
            transition: border-color 1s ease, box-shadow 1s ease;
        }

        .breath-text {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            animation: breatheTextAnimation 8s ease-in-out infinite;
            color: var(--gold-accent); 
            transition: color 1s ease;
        }

        @keyframes breatheAnimation {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.6); opacity: 0.8; box-shadow: 0 0 25px var(--glow); }
        }

        @keyframes breatheTextAnimation {
            0%, 100% { content: "Inhale"; opacity: 0.6; }
            50% { content: "Exhale"; opacity: 1; }
            48%, 52% { opacity: 0; } 
        }

        .player-container iframe {
            border-radius: 20px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 8px 20px rgba(0, 0, 0, 0.3), 
                0 0 15px var(--glow); 
            width: 100%;
            max-width: 560px;
            transition: box-shadow 1s ease;
        }

        .controls-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .mood-btn {
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--gold-accent); 
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .mood-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px var(--glow);
        }

        .mood-btn.active {
            background: var(--primary-accent); 
            color: white;
            border-color: var(--primary-accent);
            box-shadow: 0 4px 15px var(--primary-accent); 
        }

        .ambient-particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div id="ambient-layer"></div>
    
    <div class="glass-panel">
        <h1>For Air</h1>
        <p class="subtitle">A quiet coffee shop with your favorite Bossa Nova sounds ☕</p>

        <div class="breathing-visual">
            <div class="breath-ring"></div>
            <div class="breath-text" id="breath-label">Breathe</div>
        </div>
        
        <div class="player-container">
            <iframe width="100%" height="315" src="https://www.youtube.com/embed/G6gRMc6v0mI" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="controls-container">
            <button class="mood-btn" onclick="toggleMood('rain', this)">Midnight Rain</button>
            <button class="mood-btn" onclick="toggleMood('stars', this)">Deep Space</button>
            <button class="mood-btn" onclick="toggleMood('mist', this)">Magenta Mist</button>
        </div>
    </div>

    <script>
        const breathLabel = document.getElementById('breath-label');
        let breathState = 0;
        setInterval(() => {
            breathLabel.innerText = breathState === 0 ? "Exhale" : "Inhale";
            breathState = (breathState + 1) % 2;
        }, 4000); 

        const ambientLayer = document.getElementById('ambient-layer');
        let activeIntervals = [];

        function clearAtmosphere() {
            ambientLayer.innerHTML = '';
            activeIntervals.forEach(clearInterval);
            activeIntervals = [];
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('active'));
            ambientLayer.style.backdropFilter = 'none';
            ambientLayer.style.background = 'none';
            
            // Reset to default colors
            document.documentElement.style.setProperty('--bg-grad-1', '#2E004F');
            document.documentElement.style.setProperty('--bg-grad-2', '#800080');
            document.documentElement.style.setProperty('--bg-grad-3', '#A52A2A');
            document.documentElement.style.setProperty('--glow', 'rgba(244, 197, 66, 0.1)');
            document.documentElement.style.setProperty('--primary-accent', '#800080');
            document.documentElement.style.setProperty('--gold-accent', '#F4C542');
        }

        function toggleMood(moodType, buttonEl) {
            const isActive = buttonEl.classList.contains('active');
            clearAtmosphere(); 

            if (isActive) return; 

            buttonEl.classList.add('active');

            if (moodType === 'rain') {
                // Shift to deep stormy blues
                document.documentElement.style.setProperty('--bg-grad-1', '#0b132b');
                document.documentElement.style.setProperty('--bg-grad-2', '#1c2541');
                document.documentElement.style.setProperty('--bg-grad-3', '#3a506b');
                document.documentElement.style.setProperty('--glow', 'rgba(92, 184, 228, 0.3)');
                document.documentElement.style.setProperty('--primary-accent', '#3a506b');
                document.documentElement.style.setProperty('--gold-accent', '#5cb8e4');
                
                createParticles(60, 'rain'); // More rain, heavier storm
            } else if (moodType === 'stars') {
                // Shift to pitch black and gold space
                document.documentElement.style.setProperty('--bg-grad-1', '#000000');
                document.documentElement.style.setProperty('--bg-grad-2', '#111111');
                document.documentElement.style.setProperty('--bg-grad-3', '#222222');
                document.documentElement.style.setProperty('--glow', 'rgba(255, 215, 0, 0.4)');
                document.documentElement.style.setProperty('--primary-accent', '#FFD700');
                document.documentElement.style.setProperty('--gold-accent', '#FFF');
                
                createParticles(35, 'stars'); // Brighter, denser stars
            } else if (moodType === 'mist') {
                // Vibrant pink and purple nebula
                document.documentElement.style.setProperty('--bg-grad-1', '#4a0e4e');
                document.documentElement.style.setProperty('--bg-grad-2', '#812255');
                document.documentElement.style.setProperty('--bg-grad-3', '#c53173');
                document.documentElement.style.setProperty('--glow', 'rgba(255, 105, 180, 0.3)');
                document.documentElement.style.setProperty('--primary-accent', '#c53173');
                document.documentElement.style.setProperty('--gold-accent', '#ffb6c1');
                
                ambientLayer.style.backdropFilter = 'blur(6px) saturate(130%)';
                ambientLayer.style.background = 'rgba(255, 105, 180, 0.08)';
            }
        }

        function createParticles(count, type) {
            const interval = setInterval(() => {
                const p = document.createElement('div');
                p.classList.add('ambient-particle');
                
                p.style.left = Math.random() * 100 + 'vw';
                p.style.opacity = Math.random() * 0.6 + 0.4; 

                if (type === 'rain') {
                    p.style.width = '3px';
                    p.style.height = Math.random() * 30 + 15 + 'px';
                    p.style.background = 'rgba(173, 216, 230, 0.6)'; // Brighter rain
                    p.style.top = '-40px';
                    p.style.animation = `fall ${Math.random() * 1.5 + 0.8}s linear infinite`; // Faster rain
                } else if (type === 'stars') {
                    const size = Math.random() * 6 + 3; // Bigger stars
                    p.style.width = size + 'px';
                    p.style.height = size + 'px';
                    p.style.background = Math.random() > 0.5 ? '#FFF' : '#FFD700'; // Pure white or pure gold
                    p.style.top = Math.random() * 100 + 'vh';
                    p.style.animation = `drift ${Math.random() * 10 + 8}s linear infinite`;
                    p.style.boxShadow = '0 0 8px rgba(255, 255, 255, 0.8)'; // Make stars glow
                }

                ambientLayer.appendChild(p);

                setTimeout(() => p.remove(), 15000);

            }, 10000 / count); 

            activeIntervals.push(interval);
        }
    </script>

    <style>
        @keyframes fall {
            to { transform: translateY(110vh); }
        }
        @keyframes drift {
            0% { transform: translate(0, 0) scale(0.8); opacity: 0; }
            20% { opacity: 1; transform: translate(10px, -20vh) scale(1); }
            80% { opacity: 1; }
            100% { transform: translate(${Math.random() * 100 - 50}px, -110vh) scale(0.5); opacity: 0; }
        }
    </style>
</body>
</html>
